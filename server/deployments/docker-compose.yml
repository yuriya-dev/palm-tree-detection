version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: palm-tree-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: palm-tree-api
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
      DB_SSLMODE: disable
      ML_SERVICE_URL: http://ml-service:8000
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - ml-service

  ml-service:
    build:
      context: ../../ml-service
      dockerfile: Dockerfile
    container_name: palm-tree-ml-service
    environment:
      MODEL_PATH: /app/models/best.pt
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ../../ml-service/models:/app/models:ro

volumes:
  postgres_data:
